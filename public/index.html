<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f8fafc">
    <title>rythm</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/vendor/bootstrap-icons/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/src/client/styles.css">
  </head>
  <body>
    <div id="auth-screen" class="auth-screen" hidden>
      <form id="login-form" class="auth-box">
        <h1>rythm</h1>
        <p>Введите пароль, чтобы открыть личный недельный ритм.</p>
        <input id="login-password" class="form-control" type="password" autocomplete="current-password" placeholder="Пароль" required>
        <button class="btn btn-dark w-100" type="submit">Войти</button>
        <small id="login-error" class="danger-text"></small>
      </form>
    </div>

    <div id="app-shell" class="app-shell" hidden>
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <strong>rythm</strong>
            <small>168 часов как сборка недели</small>
          </div>
        </div>
        <nav class="nav nav-pills app-tabs desktop-tabs" aria-label="Разделы">
          <button class="nav-link active" data-view="week" type="button">Неделя</button>
          <button class="nav-link" data-view="activities" type="button">Активности</button>
          <button class="nav-link" data-view="stats" type="button">Статистика</button>
        </nav>
        <div class="top-actions">
          <button id="edit-mode" class="btn btn-outline-secondary btn-sm icon-button" type="button" title="Режим редактирования" aria-label="Режим редактирования">
            <i class="bi bi-pencil-square" aria-hidden="true"></i>
          </button>
          <button id="settings-button" class="btn btn-outline-secondary btn-sm icon-button" type="button" title="Настройки" aria-label="Настройки">
            <i class="bi bi-gear" aria-hidden="true"></i>
          </button>
          <button id="sync-status" class="sync-status is-syncing" type="button" title="Загрузка" aria-label="Статус синхронизации: Загрузка">
            <span class="sync-dot"></span>
          </button>
        </div>
      </header>

      <main class="main">
        <aside id="activity-picker" class="activity-picker"></aside>
        <section id="view" class="view"></section>
      </main>

      <nav class="mobile-nav nav nav-pills" aria-label="Разделы">
        <button class="nav-link active" data-view="week" type="button">
          <i class="bi bi-calendar-week" aria-hidden="true"></i>
          <span>Неделя</span>
        </button>
        <button class="nav-link" data-view="activities" type="button">
          <i class="bi bi-diagram-3" aria-hidden="true"></i>
          <span>Активности</span>
        </button>
        <button class="nav-link" data-view="stats" type="button">
          <i class="bi bi-bar-chart" aria-hidden="true"></i>
          <span>Статистика</span>
        </button>
      </nav>
    </div>

    <div class="modal fade" id="item-dialog" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <form class="modal-content app-modal">
          <div class="modal-header">
            <h3 id="item-dialog-title" class="modal-title">Блок</h3>
            <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Закрыть"></button>
          </div>
          <div id="item-dialog-content" class="modal-body"></div>
        </form>
      </div>
    </div>

    <div class="modal fade" id="activity-dialog" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <form class="modal-content app-modal">
          <div class="modal-header">
            <h3 id="activity-dialog-title" class="modal-title">Активность</h3>
            <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Закрыть"></button>
          </div>
          <div id="activity-dialog-content" class="modal-body"></div>
        </form>
      </div>
    </div>

    <div class="modal fade" id="picker-dialog" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered">
        <div class="modal-content app-modal">
          <div class="modal-header">
            <h3 class="modal-title">Закуп активности</h3>
            <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Закрыть"></button>
          </div>
          <div id="picker-dialog-content" class="modal-body"></div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="settings-dialog" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <form class="modal-content app-modal">
          <div class="modal-header">
            <h3 class="modal-title">Настройки</h3>
            <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Закрыть"></button>
          </div>
          <div id="settings-content" class="modal-body"></div>
        </form>
      </div>
    </div>

    <script src="/vendor/jquery.min.js"></script>
    <script src="/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/src/client/state.js"></script>
    <script src="/src/client/storage.js"></script>
    <script src="/src/client/sync.js"></script>
    <script src="/src/client/color-picker.js"></script>
    <script src="/src/client/week-view.js"></script>
    <script src="/src/client/activities-view.js"></script>
    <script src="/src/client/stats-view.js"></script>
    <script src="/src/client/app.js"></script>
  </body>
</html>
